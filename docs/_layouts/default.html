<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="{{ site.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{ site.url }}{{ site.baseurl }}/">
  <meta property="og:site_name" content="ScreenLeak">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">

  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ site.baseurl }}/">
        <span class="brand-mark">▍</span>
        <span class="brand-name">screenleak</span>
      </a>
      <nav>
        <a href="https://github.com/screenpipe/screenleak">github</a>
        <span class="dot">·</span>
        <a href="https://github.com/screenpipe/screenleak/blob/main/results/unified_leaderboard.md">leaderboard</a>
        <span class="dot">·</span>
        <a href="mailto:louis@screenpi.pe">contact</a>
      </nav>
    </div>
  </header>

  <main class="paper">
    <article>
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <p class="row">
        <span>ScreenLeak v0 · 2026 · Apache 2.0 (code) / CC BY 4.0 (data)</span>
        <span>by <a href="https://x.com/louis030195">Louis Beaumont</a> · built on <a href="https://screenpi.pe">screenpipe</a></span>
      </p>
    </div>
  </footer>
</body>
</html>
